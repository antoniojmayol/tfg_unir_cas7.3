logging.config=file:/home/amh09h/cas7.3/cas-overlay-template/etc/cas/config/log4j2.xml
logging.level.org.apereo.cas=INFO

logging.level.org.pac4j.google=DEBUG
logging.level.org.apereo.cas.web.flow.actions.DelegatedClientAuthenticationAction=DEBUG
logging.level.org.apereo.cas.web.flow.DefaultDelegatedClientAuthenticationWebflowManager=DEBUG
logging.level.org.apereo.cas.authentication.principal.DefaultDelegatedAuthenticationCredentialExtractor=DEBUG
logging.level.org.apereo.cas.support.pac4j=DEBUG
logging.level.org.apereo.cas.ticket=DEBUG

logging.level.org.springframework.web=DEBUG
logging.level.org.apereo.cas.web.flow=DEBUG
logging.level.org.springframework.jdbc=DEBUG

# 1. Habilitar auditoría vía SLF4J
#Formato por defecto de la auditoría, en una sola línea separade por pipes
cas.audit.slf4j.enabled=true
cas.audit.slf4j.use-single-line=true
cas.audit.slf4j.singleline-separator=|

# 2. El formato ahora suele ser parte de la configuración general de auditoría
# En CAS 7.3, si no usas un formato personalizado, el DEFAULT es el predeterminado.
cas.audit.engine.enabled=true
cas.audit.engine.audit-format=DEFAULT

# 3. CABECERA DE IP (Importante para proxys/X-Forwarded-For)
cas.audit.engine.alternate-client-addr-header-name=X-Forwarded-For

# 4. APP CODE (El que te dio el error)
cas.audit.engine.alternate-server-addr-header-name=CAS
